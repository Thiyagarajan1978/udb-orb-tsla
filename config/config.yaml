# ============================================================
#  UDB-ORB-TSLA configuration
#  Every value here traces to the v12.4.3 Pine Script
#  "Adaptive TP + Reversal (Best Combined)" profile on TSLA 5m.
#  Do not edit the `profile` block unless you intend to diverge
#  from the verified port — the tests assert these values.
# ============================================================

symbol: TSLA
timeframe_minutes: 5
timezone: America/New_York

# ---- Execution realism -------------------------------------------------
# ADOPTED 2026-07-11: a REAL broker resting stop (OCO), modelled by "touch". Stop-type exits
# (Base SL / BE Stop / BE Trail / runner peak-trail) fill INTRABAR at the stop level, gap-aware
# (a bar opening beyond the stop fills at the worse open). This is NOT the zero-slippage fantasy —
# it is the honest model of a resting stop order, and it requires placing OCO stops with the broker
# (i.e. this is no longer purely alerts-only for the stop leg). Over 3 years it lifts net +18%
# (+295 -> +349 /unit) AND halves the worst day (-12.3 -> -7.8) and worst trade (-9.03 -> -5.02),
# because BE stops now fill at ~entry instead of a bar close far below it. See BE_STOP_ANALYSIS §22.
execution:
  # HOW STOP EXITS FILL — the single biggest lever (per external review, confirmed):
  #   "touch" : ADOPTED. Real broker resting stop. Trigger on the wick reaching the stop; fill at
  #             the stop level, or at the OPEN if the bar gapped through it (gap-aware, honest).
  #   "close" : ALERTS-ONLY (prior default). Trigger & fill on the bar CLOSE — a BE stop is a real
  #             ~$3.68/share loss. Use this if you are NOT placing resting stops (manual workflow).
  #   "touch" : BROKER RESTING STOP (e.g. TradeStation). Trigger on the wick, gap-aware fill at
  #             min(stop, open). BE stops become ~0-scratches, so net roughly DOUBLES and the
  #             worst day shrinks — BUT it also wicks out trades that dip to entry and recover.
  #             Both effects are modelled. Charge realistic slippage (slippage_per_unit 0.10-0.20).
  #   "stop"  : Pine intrabar reproduction — fill exactly at the stop level (an upper-bound
  #             fantasy: assumes zero gap slippage). Used only by faithful_be035.yaml.
  # Honest 3-year range (net): close-fill +65/+80/+192 (PF ~1.2)  ->  touch@$0.10 +135/+131/+236
  # (PF ~1.4-2.6). The truth for YOUR fills is measurable: paper-trade a resting stop on
  # TradeStation and compare. See docs/BE_STOP_ANALYSIS.md §18.
  stop_fill_mode: touch
  exit_on_close: true      # legacy flag; ignored when stop_fill_mode is set
  # Resting protective stop at the OR boundary (opt-in). TESTED and left OFF: the realistic
  # worst days are whipsaws on WIDE-OR days where the loss closes *within* the OR range (above
  # the boundary), so an OR-boundary stop doesn't cap them and can even worsen a wick-and-recover
  # bar. The real tail driver is the 2x reversal on wide-OR whipsaw days — see max_or_width.
  protective_stop: false
  # Daily loss circuit-breaker: once the day's realised P&L <= -limit, take no NEW entries that
  # day (an open position still manages to its own exit). 0 = off.
  daily_loss_limit: 0.0

session:
  # Regular trading hours (ET). The opening range is the first bar (09:30-09:35).
  rth_start: "09:30"
  rth_end:   "16:00"
  market_open:  "09:30"   # opening-range bar start (specificTime in Pine)
  eod_exit:     "15:50"   # forced close alert time (v11.20 default for 5m)

# ---- Faithful port of the Adaptive TP + Reversal profile -----------
# These resolve exactly what the Pine PROFILE_ADAPTIVE_REVERSAL branch computes,
# with Auto-Tune ON for a 5-minute chart.
profile:
  name: "Adaptive TP + Reversal (Best Combined)"

  # Position sizing
  trade_qty: 1.0
  # Realistic per-unit exit cost (spread/slippage). Applied to EVERY exit leg incl. partials.
  # ADOPTED 2026-07-11 = 0.10 (was 0.02): a CONSERVATIVE allowance for stop-fill slippage and
  # liquidity sweeps. A resting stop becomes a MARKET order when triggered, so it can fill worse
  # than the level, and the 5m backtest fills AT the level (it cannot see sub-bar sweep wicks).
  # Every $0.10/share of stop slippage costs ~$59/unit over the 2.5yr ledger; 0.10 haircuts net
  # +348.7 -> ~+290. Paper-trade to MEASURE your true fills. See BE_STOP_ANALYSIS §23.
  slippage_per_unit: 0.10

  # Breakout buffer (% of opening-range width)
  use_breakout_buffer: true
  buffer_pct_or: 10.0

  # Stop loss: "Candle High/Low + Max Cap" -> OR-boundary stop, but never further than fixed_sl
  # from entry. ADOPTED (with confirm_breakout, §20): the confirmation candle enters later/more
  # extended, so the entry can sit far from the OR-boundary stop; capping at $5 neutralises that
  # tail. Cuts the 2024 worst day -14.9 -> -8.7 (better than the immediate-entry -9.7) while
  # keeping ~50% win rate. Standalone the cap was noise (§16); it earns its place only paired
  # with confirmation. Options: "Candle High/Low" | "Fixed Distance" | "Candle High/Low + Max Cap".
  sl_mode: "Candle High/Low + Max Cap"
  sl_offset: 0.0
  fixed_sl: 5.0            # max stop distance from entry (Max-Cap mode)

  # Take profit: Adaptive (% of OR width)
  # NOTE: adaptive_tp_scale = 1.0. (Optimistic-fill tuning liked 1.25, but re-tuned under the
  # realistic exit_on_close model 1.0 wins both train+holdout — a wider TP just rides more
  # trades into a real BE-stop loss. 1.0 also equals the Pine port value.)
  tp_mode: "Adaptive"      # Adaptive | Fixed
  adaptive_tp_scale: 1.0   # TP distance = max(floor, OR_width * scale)  [re-tuned under realism]
  adaptive_tp_min: 2.14    # floor
  fixed_tp: 2.14           # only used when tp_mode == Fixed

  # BE Retrace Shift (5m). NOTE: default adopted as 0.55 (tuned) — validated train(2024-25)
  # + holdout(2026) to cut premature BE-Stop failures (WR 51.6->55.2%, BE-stops 68->56, more
  # net). The exact Pine port value was 0.35 — reproduce it with config/faithful_be035.yaml.
  # See docs/BE_STOP_ANALYSIS.md.
  use_be_retrace: true
  be_retrace_trigger: 0.55   # % of OR width  [adopted tuned default; Pine port = 0.35]
  be_trail_amount: 0.25      # price units
  be_retrace_use_close: false  # false = wick-based (Adaptive+Reversal is NOT Pure Trail)

  # Partial exit + VWAP trail (auto-tuned for 5m)
  use_partial_exit: true
  partial_qty_pct: 25.0      # close 25% at TP, 75% trails
  partial_activation: 1.00   # profit threshold before VWAP trail arms

  # Reversal trades (2x size after primary SL)
  use_reversal: true
  reversal_qty_mult: 2.0
  reversal_target: 5.0       # fixed TP distance for reversal leg
  apply_be_to_reversal: true
  # Reversal risk control. The reversal enters after price crossed the whole OR, so its stop
  # (opposite OR boundary) is far away — its risk runs 2-4x the primary's, then gets DOUBLED by
  # the 2x size. That is 68% of the worst-day damage. Cap the reversal leg's dollar risk:
  #   scale = shrink qty so risk <= cap (keeps participation)   skip = don't take the reversal
  # ADOPTED: $6 = RISK PARITY with the primary leg (primary avg risk $6.16, reversal was $10.03
  # = 1.6x). The 2x share multiplier was never risk-adjusted. Scaling to equal dollar risk cuts
  # the worst day 41% (-16.5 -> -9.7) for 18% net, i.e. +40% return per $1 of worst-day risk.
  # 'skip' mode was tested and rejected (train +163 / holdout +164 — regime-dependent).
  reversal_risk_cap: 6.0     # 0 = off (dollars: risk_per_unit * qty)
  reversal_risk_mode: scale  # scale | skip

  # Max OR width filter — ADOPTED for tail control under realistic fills. The realistic worst
  # days are whipsaws on WIDE-OR days (risk $12-17) where the primary AND 2x reversal both take
  # real close-based losses. Skipping OR width > $8 cuts the worst day (train -24->-17, holdout
  # -22->-16) with net flat-to-up (train +61%). See docs/BE_STOP_ANALYSIS.md §9.
  min_or_width_enabled: false
  min_or_width: 2.50
  max_or_width_enabled: true
  max_or_width: 8.0
  use_vwap_filter: false

  # Trade side
  trade_side_mode: "Both"    # Both | Long Only | Short Only

# ---- ENHANCEMENTS (default OFF so the port stays verifiable) --------
# Turn these on one at a time and compare against the faithful baseline.
enhancements:
  # 1) Require volume confirmation on the breakout bar.
  rvol_filter:
    enabled: false
    lookback_bars: 20        # avg volume window (same session + prior sessions)
    min_rvol: 1.2            # breakout bar volume must be >= min_rvol * avg

  # 1b) VOLATILITY REGIME GATE — ADOPTED. This is a LOW-VOL breakout system: with close-based BE
  #     stops, a high-vol bar closes further past the stop, so BE-stop cost scales with vol. Days
  #     in the top vol quintile are the ONLY net-negative bucket (mean -0.156/day vs +0.72..+0.89
  #     for Q1-Q4). Skip a day when the prior 20-day realised daily volatility exceeds the
  #     threshold — known at the open, so it is a true PRE-ENTRY filter.
  #     Threshold = 80th pct of 2024-25 ONLY. 2026 (OOS) has ZERO such days, so it cannot overfit.
  #     2024 +50->+82 (+64%), 2025 -$3 (neutral), 2026 unchanged. See docs/BE_STOP_ANALYSIS.md §12.
  volatility_regime:
    enabled: true
    lookback: 20
    max_rvol_pct: 4.92   # skip day if prior-20d stdev of daily returns (%) exceeds this

  # 2) Skip / flag days by opening-range width regime.
  or_width_regime:
    enabled: false
    skip_below: 0.0          # skip if OR width < this (0 = no floor)
    skip_above: 0.0          # skip if OR width > this (0 = no cap)

  # 3) Time-of-day entry window (ET). Only enter within [start, end].
  time_window:
    enabled: false
    start: "09:35"
    end:   "14:00"

  # 4) Improved reversal capture on false-breakout days (they close opposite ~74% of the
  #    time). ADOPTED default = trigger_on_be_stop + trail_to_eod — validated train(2024-25)
  #    +holdout(2026): net +7% both, more reversal P&L, better worst day. See BE_STOP_ANALYSIS.md.
  #    (faithful_be035.yaml keeps this OFF to reproduce the exact Pine reversal.)
  reversal_capture:
    enabled: true
    trigger_on_be_stop: true    # enter reversal on a RAW opposite OR break (earlier) instead
                                # of waiting for a fresh *buffered* close-break
    trail_to_eod: true          # reversal rides the full move (no fixed $5 TP, no partial) —
                                # BE-trail + EOD only, to capture the whole reverse trend
    target_or_mult: 0.0         # >0: reversal TP = mult * OR_width (adaptive) instead of fixed $5
    reenter_after_whipsaw: false  # after BOTH primary AND reversal stop out (a whipsaw day),
                                # re-enter ONCE in the ORIGINAL direction on a fresh raw OR break

  # 6) Runner peak-trail. After the 25% partial, the remaining 75% currently has NO trailing
  #    stop until price retraces to the BE trigger — so on trend days it holds to EOD and gives
  #    back the whole fade from the peak (~$3-6.5/unit). This trails the runner `or_mult` * OR
  #    width below the running peak, engaging immediately after the partial, to bank more of it.
  # Runner peak-trail. Re-tuned under realistic exit_on_close: 0.75xOR wins both train+holdout
  # (optimistic-fill tuning liked 1.0). Banks more of the runner's peak after the partial.
  runner_trail:
    enabled: true
    or_mult: 0.75   # runner exits when price retraces this * OR width from its post-partial peak

  # 4b) RESUME re-entry — BUILT, TESTED, REJECTED (default OFF, opt-in only).
  #     Arms when the PRIMARY stops; re-enters the SAME direction when price closes back beyond
  #     the original break level (a shakeout that resumed, e.g. 2026-07-09 where it turns the day
  #     from -$5.60 to +$1.48). Distinct from reenter_after_whipsaw (which needs BOTH legs stopped).
  #
  #     WHY REJECTED: it only pays in 2025, and it competes with the reversal for the same slot.
  #       resume leg P&L : 2024 -$16.7 (32% WR) | 2025 +$83.7 (62% WR) | 2026 -$16.8 (36% WR)
  #       2024 compete   : preempted +$46.5 of GOOD reversals, returned -$16.7  -> net -$63
  #       holdout (2026) : every variant is worse than baseline on net, PF AND worst day.
  #       'both armed' (3 legs) looks best on train (+$219) and worst on holdout (+$171, worst
  #       -$13.7) — the classic overfit signature.
  #     2025 was a shakeout regime (its reversals lost -$36); 2024/2026 were reversal regimes.
  #     We cannot tell which regime we're in ex ante, so the reversal (positive in 2/3 years) wins.
  #     See docs/BE_STOP_ANALYSIS.md §13.
  resume_reentry:
    enabled: false
    trigger: buffered   # buffered (close beyond the original break level) | raw (beyond OR bound)
    risk_cap: 0.0       # 0 = off; scale qty so (entry -> OR boundary) * qty <= cap
    disarm_other: true  # true = resume/reversal compete for one slot (2 legs/day max)
                        # false = both stay armed (up to 3 legs) — worse tail, worse holdout

  # 4c) 2-close acceptance (from ORB A+R v1.23). Require the PREVIOUS bar to also close beyond the
  #     trigger before entering. TESTED and REJECTED decisively: it delays the fill and
  #     2024 +65.7 -> +43.1 with worst day -9.7 -> -14.9; 2026 +192.3 -> +150.3. Default OFF.
  confirm_two_closes:
    enabled: false

  # 4d) Confirmation candle (under test). Instead of entering on the first close-break, require the
  #     NEXT candle to HOLD beyond the trigger (and, if require_trend_candle, be a with-trend candle
  #     — green for longs / red for shorts). If it snaps back inside, wait for a fresh break.
  #     Enters at the confirmation candle's close. Avoids chasing an extended first-break bar that
  #     immediately reverses (e.g. 2026-07-09 10:00 break -> 10:05 back inside).
  # ADOPTED (§20): higher win rate (47.6% -> 50.0% over 3 years) by skipping the immediate
  # first-break entry and requiring the next candle to HOLD beyond the trigger (green for longs,
  # red for shorts). Pairs with sl_mode Max-Cap $5, which caps the wider entry->stop distance the
  # later entry creates. Trade-off: ~$14/yr less net than immediate entry; better worst day.
  confirm_breakout:
    enabled: true
    require_trend_candle: true
    # hold_bars = prior consecutive same-day bars that must close beyond the trigger before entry.
    # 1 = the ADOPTED 2-candle rule (break bar + entry bar). Higher values tested and REJECTED
    # (§21): 2 (3-candle) cuts 3yr net -24% (+295 -> +224), gutting 2025 (+124 -> +47) for +0.7pt
    # WR; later entries just miss the trend body. Keep at 1.
    hold_bars: 1

  # 5) PDH/PDL confirmation filter. Prior-day high/low are strong S/R — a breakout that thrusts
  #    into them tends to fade (an immediate reversal / BE-stop). When PDH/PDL sits NEAR the
  #    breakout level (within proximity_pct of the OR width), require the bar to CLOSE BEYOND
  #    PDH (longs) / PDL (shorts) before entering, instead of just beyond the OR buffer.
  pdh_pdl_filter:
    enabled: false
    proximity_pct: 14.0   # PDH/PDL is "near" if within this % of OR width of the break level

# ---- Data / storage ------------------------------------------------
data:
  provider: fmp              # fmp | local_parquet
  cache_dir: data/cache
  db_path: data/udb_orb.db

# ---- Alerts --------------------------------------------------------
alerts:
  enabled: true
  channels: [email, webhook]  # any of: email, webhook  (each also needs env vars)
  events:                     # which events to notify on
    - primary_entry
    - reversal_entry
    - be_retrace_fired
    - tp_full
    - partial_exit
    - be_trail_exit
    - be_stop_exit
    - vwap_cross_exit
    - base_sl_exit
    - eod_exit

# ---- Live loop -----------------------------------------------------
live:
  poll_seconds: 30           # how often to poll FMP for the latest closed bar
  lookback_days: 3           # history to pull on each live refresh (for VWAP/RVOL)
