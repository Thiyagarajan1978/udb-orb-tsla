# CONFIG C-ATR - volatility-ADAPTIVE take-profit (TP = 0.25 x 14-day ATR, floor $1) + $6 BE-stop.
# Evolution of Config C: instead of a flat $2 target, the target auto-widens in high-vol regimes
# and tightens in calm ones. Shifts the profit frontier OUT ~$5k/100sh at any given win rate.
# Validated 2022-2026 (net @100sh): 2022 +20,022 | 2023 +17,823 | 2024 +12,520 | 2025 +15,618 |
# 2026 +21,612 = +87,595 (all years positive; +33% vs flat-$2 C). Walk-forward OOS 2025-2026
# (mult fit on 2022-2024) = +$40,578 vs flat-C +$21,811 -> generalizes. WR ~50% (flat-C was 57%);
# it trades win-rate for net - the frontier shift is real but the WR-vs-net trade-off remains.
symbol: TSLA
timeframe_minutes: 5
timezone: America/New_York
execution:
  stop_fill_mode: touch
  exit_on_close: true
  protective_stop: false
  daily_loss_limit: 0.0
session:
  rth_start: 09:30
  rth_end: '16:00'
  market_open: 09:30
  eod_exit: '15:50'
profile:
  name: Adaptive TP + Reversal (Best Combined)
  trade_qty: 1.0
  slippage_per_unit: 0.1
  use_breakout_buffer: true
  buffer_pct_or: 10.0
  sl_mode: Candle High/Low + Max Cap
  sl_offset: 0.0
  fixed_sl: 6.0
  tp_mode: ATR
  adaptive_tp_scale: 1.0
  adaptive_tp_min: 2.14
  fixed_tp: 2.0
  use_be_retrace: true
  be_retrace_trigger: 0.55
  be_trail_amount: 0.25
  be_retrace_use_close: false
  use_partial_exit: false
  partial_qty_pct: 25.0
  partial_activation: 1.0
  use_reversal: true
  reversal_qty_mult: 2.0
  reversal_target: 5.0
  apply_be_to_reversal: true
  reversal_risk_cap: 6.0
  reversal_risk_mode: scale
  min_or_width_enabled: false
  min_or_width: 2.5
  max_or_width_enabled: true
  max_or_width: 8.0
  use_vwap_filter: false
  trade_side_mode: Both
  atr_tp_mult: 0.25
  atr_tp_min: 1.0
  atr_period: 14
enhancements:
  rvol_filter:
    enabled: false
    lookback_bars: 20
    min_rvol: 1.2
  volatility_regime:
    enabled: true
    lookback: 20
    max_rvol_pct: 4.92
  or_width_regime:
    enabled: false
    skip_below: 0.0
    skip_above: 0.0
  time_window:
    enabled: false
    start: 09:35
    end: '14:00'
  reversal_capture:
    enabled: true
    trigger_on_be_stop: true
    trail_to_eod: true
    target_or_mult: 0.0
    reenter_after_whipsaw: false
  runner_trail:
    enabled: true
    or_mult: 0.75
  resume_reentry:
    enabled: false
    trigger: buffered
    risk_cap: 0.0
    disarm_other: true
  confirm_two_closes:
    enabled: false
  confirm_breakout:
    enabled: false
    require_trend_candle: true
    hold_bars: 1
  pdh_pdl_filter:
    enabled: false
    proximity_pct: 14.0
data:
  provider: fmp
  cache_dir: data/cache
  db_path: data/udb_orb.db
alerts:
  enabled: true
  channels:
  - email
  - webhook
  events:
  - primary_entry
  - reversal_entry
  - be_retrace_fired
  - tp_full
  - partial_exit
  - be_trail_exit
  - be_stop_exit
  - vwap_cross_exit
  - base_sl_exit
  - eod_exit
live:
  poll_seconds: 30
  lookback_days: 3
